services:
  postgres:
    image: postgres:15
    restart: always
    container_name: gm-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: gara-market
    ports:
      - "5432:5432"
    profiles: [ "api" ]

  redis:
    image: redis:7
    restart: always
    container_name: gm-redis
    ports:
      - "6379:6379"
    command: [ "redis-server", "--appendonly", "yes" ]
    profiles: [ "api" ]

  gm-api:
    container_name: gm-api
    build:
      context: ./gm-api
      dockerfile: ../docker/gm-api.Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    ports:
      - "3000:3000"
      - "9230:9230" # порт для Node.js debug
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: root
      DATABASE_NAME: gara-market
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - postgres
      - redis
    profiles: [ "api" ]

  gm-frontend:
    build:
      context: ./gm-frontend
      dockerfile: ../docker/gm-frontend.Dockerfile
    ports:
      - "4200:4200"
    depends_on:
      - gm-api
    profiles: [ "frontend" ]