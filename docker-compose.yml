services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    container_name: gm-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
      POSTGRES_DB: gara-market
    ports:
      - "5432:5432"
    volumes:
      - gm-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d gara-market"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    profiles: ["api"]

  redis:
    image: redis:7
    restart: unless-stopped
    container_name: gm-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - gm-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    profiles: ["api"]

  gm-api:
    container_name: gm-api
    restart: unless-stopped
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    working_dir: /app
    ports:
      - "3000:3000"
      - "9230:9230"
    volumes:
      - ./backend:/app
    environment:
      NODE_ENV: development
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: root
      DATABASE_NAME: gara-market
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CHOKIDAR_USEPOLLING: "false"
      WATCHPACK_POLLING: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["yarn", "start:dev"]
    profiles: ["api"]

  gm-frontend:
    container_name: gm-frontend
    restart: unless-stopped
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    working_dir: /app
    ports:
      - "4200:4200"
      - "3001:3001"
    volumes:
      - ./frontend:/app
    environment:
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "false"
      WATCHPACK_POLLING: "false"
    depends_on:
      gm-api:
        condition: service_started
    command:
      [
        "sh",
        "-c",
        "yarn json-server --watch db.json --host 0.0.0.0 --port 3001 & yarn start"
      ]
    profiles: ["frontend"]

volumes:
  gm-postgres-data:
  gm-redis-data: